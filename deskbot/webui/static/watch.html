<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>deskbot — watch</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236f5bff'/%3E%3Cstop offset='1' stop-color='%2334c8e8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='url(%23g)'/%3E%3Cpath d='M26 20 L46 32 L26 44 Z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/watch.css">
  <!-- Warms the connection ahead of the actual request, shaving real
       latency off the first video load / player API fetch. -->
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="dns-prefetch" href="https://www.youtube.com">
</head>
<body>
  <!-- No buttons, sliders, or drag handles anywhere below this comment on
       purpose — once a video is playing, the composer is the only control
       surface in the app. Volume, mute, play/pause, layout, resize, and
       closing a pane are all typed commands, interpreted by
       classify_command() in deskbot/webui/watch.py. -->
  <div id="stage">
    <div id="stage-grid" data-layout="1"></div>
  </div>

  <div id="composer">
    <div id="thread" aria-live="polite"></div>
    <form id="composer-form">
      <input id="composer-input" type="text" autocomplete="off" placeholder="What do you want to watch?" autofocus>
      <button id="composer-send" type="submit" aria-label="Send">&#10148;</button>
    </form>
  </div>

  <script src="/static/watch.js"></script>
</body>
</html>
